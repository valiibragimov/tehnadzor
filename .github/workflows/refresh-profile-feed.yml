name: Refresh Profile Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build profile feed JSON
        run: npm run build:profile-feed

      - name: Deploy hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEHNADZOR_ONLINE }}
          channelId: live
          projectId: tehnadzor-online
