<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход — SCOPE</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="shortcut icon" href="favicon.ico">

    <!-- Шрифт такой же, как в основном приложении -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Используем общий style.css, чтобы был единый стиль -->
  <link rel="stylesheet" href="style.css?v=41">

    <script type="module" src="dist/firebase.js"></script>
    <script type="module" src="dist/auth.js"></script>
</head>
<body class="login-page">

<div class="auth-card auth-card--login">
    <div class="auth-shell">
        <div class="auth-brand">
            <div class="auth-brand-row">
                <div class="auth-brand-mark" aria-hidden="true">ТО</div>
                <div class="auth-brand-copy">
                    <span class="auth-eyebrow">Система строительного технадзора</span>
                    <h1 class="auth-product">SCOPE</h1>
                </div>
            </div>
            <p class="auth-description">
                Единая рабочая среда для контроля проектов, фиксации замечаний и ведения строительного надзора.
            </p>
        </div>

        <div class="auth-panel">
            <div class="auth-heading">
                <h2 class="auth-title">Вход в аккаунт</h2>
            </div>

            <div class="auth-field">
                <label class="auth-label" for="loginEmail">Email</label>
                <input
                    id="loginEmail"
                    class="auth-input"
                    type="email"
                    placeholder="name@company.ru"
                    autocomplete="email"
                    inputmode="email"
                    spellcheck="false"
                >
            </div>

            <div class="auth-field">
                <label class="auth-label" for="loginPassword">Пароль</label>
                <div class="auth-password-wrap">
                    <input
                        id="loginPassword"
                        class="auth-input"
                        type="password"
                        placeholder="Введите пароль"
                        autocomplete="current-password"
                    >
                    <button
                        id="btnToggleLoginPassword"
                        class="auth-password-toggle"
                        type="button"
                        aria-label="Показать пароль"
                        aria-pressed="false"
                    >
                        <svg class="auth-password-icon auth-password-icon--show" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8"/>
                        </svg>
                        <svg class="auth-password-icon auth-password-icon--hide" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 3 21 21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            <path d="M10.6 5.2A11.8 11.8 0 0 1 12 5c6.4 0 10 7 10 7a18.2 18.2 0 0 1-4.1 4.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M6.7 6.7C4 8.3 2 12 2 12s3.6 6 10 6c1.8 0 3.4-.5 4.7-1.1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M9.9 9.9A3 3 0 0 0 9 12a3 3 0 0 0 4.8 2.4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="auth-visually-hidden">Показать пароль</span>
                    </button>
                </div>
            </div>

            <div class="forgot-password">
                <a href="#" id="btnForgotPassword">Забыли пароль?</a>
            </div>

            <div id="authMessage" class="auth-message" hidden aria-live="polite"></div>

            <button id="btnLogin" type="button">Войти</button>

            <div class="auth-divider" aria-hidden="true">
                <span>или</span>
            </div>

            <button id="btnGoogleLogin" class="btn-google" type="button">
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                    <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                    <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.348 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
                    <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
                </svg>
                <span>Продолжить через Google</span>
            </button>

            <p class="link">
                Нет аккаунта? <a href="register.html">Создать</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
